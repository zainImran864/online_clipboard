name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Non-blocking for now: the repo has pre-existing lint debt. Remove
      # continue-on-error once `npm run lint` passes cleanly to make it a gate.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          # Public Firebase values are safe to expose and only needed so the
          # client bundle builds; use placeholders in CI (no real project needed).
          NEXT_PUBLIC_FIREBASE_API_KEY: "ci-placeholder"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "ci.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "ci-project"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "ci.appspot.com"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:ci"
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: "G-CIPLACEHOLDER"
